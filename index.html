<!DOCTYPE html>
<html lang="en">
<head>
      <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f5f2ed">
    <!-- iOS specific meta tags for PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Library">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f2ed;
      --bg-card: #fffef9;
      --fg: #1a1714;          /* Darker for better boldness perception */
      --fg-muted: #5a5650;    /* Darker muted text */
      --accent: #b85c38;
      --border: #e0d9cf;
      --shadow: 0 2px 12px rgba(42, 37, 32, 0.08);
      --shadow-hover: 0 8px 24px rgba(42, 37, 32, 0.12);
    }

    [data-theme="dark"] {
      --bg: #16140f;
      --bg-card: #1e1b15;
      --fg: #f0ece4;          /* Brighter for dark mode boldness */
      --fg-muted: #b0aa9f;
      --accent: #e07a5f;
      --border: #2e2a24;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
      font-weight: 500; /* Base weight increased */
    }

    .header {
      padding: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-family: 'Lora', serif;
      font-size: 2.5rem;
      font-weight: 700; /* Bold */
      letter-spacing: -0.02em;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      stroke: var(--fg);
      fill: none;
      stroke-width: 2.5; /* Thicker icons */
    }

    .sun-icon { display: block; }
    .moon-icon { display: none; }
    [data-theme="dark"] .sun-icon { display: none; }
    [data-theme="dark"] .moon-icon { display: block; }

    .library {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .book-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }

    .book-cover {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--border);
      display: block;
    }

    .book-cover-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, var(--border) 0%, var(--bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lora', serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--fg-muted);
    }

    .book-info {
      padding: 1.25rem;
    }

    .book-title {
      font-family: 'Lora', serif;
      font-size: 1.4rem;
      font-weight: 700; /* Bold */
      margin-bottom: 0.25rem;
      line-height: 1.3;
    }

    .book-author {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--fg-muted);
      margin-bottom: 0.75rem;
    }

    .book-meta {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--fg-muted);
      display: flex;
      gap: 1rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--fg-muted);
    }

    .empty-state p {
      margin-top: 1rem;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .loading {
      display: flex;
      justify-content: center;
      padding: 4rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .header {
        padding: 1.25rem;
      }
      .header h1 {
        font-size: 1.75rem;
      }
      .library {
        padding: 1.25rem;
      }
      .books-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Library</h1>
    <button class="theme-toggle" aria-label="Toggle theme">
      <svg class="sun-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
      <svg class="moon-icon" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </header>

  <main class="library">
    <div id="books-container" class="books-grid">
      <div class="loading">
        <div class="spinner"></div>
      </div>
    </div>
  </main>

  <script>
    // Theme management
    const themeToggle = document.querySelector('.theme-toggle');
    
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) {
        setTheme(saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        setTheme('dark');
      }
    }

    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    initTheme();

    // Books manifest - add your books here
    const booksManifest = [
      { slug: 'alexandru-lăpuşneanu', path: 'Books/alexandru-lăpuşneanu/info.json' },
      { slug: 'electro-softing-tematica', path: 'Books/electro-softing-tematica/info.json' }
      // Add more books as needed:
      // { slug: 'another-book', path: 'Books/another-book/info.json' }
    ];

    // Load and display books
    async function loadBooks() {
      const container = document.getElementById('books-container');
      const books = [];

      for (const bookEntry of booksManifest) {
        try {
          const response = await fetch(bookEntry.path);
          if (response.ok) {
            const data = await response.json();
            books.push({ ...data, slug: bookEntry.slug });
          }
        } catch (err) {
          console.warn(`Could not load: ${bookEntry.path}`);
        }
      }

      if (books.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
            <p>No books found. Add a book folder to your Books directory.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = books.map(book => `
        <a href="reader.html?book=${book.slug}" class="book-card">
          ${book.cover 
            ? `<img src="Books/${book.slug}/${book.cover}" alt="${book.title}" class="book-cover">`
            : `<div class="book-cover-placeholder">${book.title.charAt(0)}</div>`
          }
          <div class="book-info">
            <h2 class="book-title">${book.title}</h2>
            <p class="book-author">by ${book.author}</p>
            <div class="book-meta">
              ${book.year ? `<span>${book.year}</span>` : ''}
              ${book.chapters ? `<span>${book.chapters.length} chapters</span>` : ''}
            </div>
          </div>
        </a>
      `).join('');
    }

    loadBooks();
  </script>
</body>
</html>
